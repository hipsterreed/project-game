<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>The Quiet Cliffs</title>
    <style>
      :root {
        --bone: #ede1c8;
        --pale: #d6c7a4;
        --warm: #f4d49a;
        --gold: #ffba6a;
        --dust: #c4a173;
        --deep: #2a1d12;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #000;
        color: var(--pale);
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        cursor: default;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---- title ---- */
      #title {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        pointer-events: none;
        background:
          radial-gradient(ellipse at 50% 60%, transparent 35%, rgba(0,0,0,0.55) 100%);
        transition: opacity 1.8s ease;
        z-index: 5;
      }
      #title.hidden { opacity: 0; }
      #title h1 {
        font-size: clamp(54px, 10vw, 140px);
        font-weight: 200;
        letter-spacing: 0.45em;
        color: #3a2a1a;
        text-shadow:
          0 0 36px rgba(255, 220, 170, 0.18),
          0 2px 14px rgba(0,0,0,0.35);
        margin-bottom: 0.55em;
        margin-right: -0.45em; /* compensate for trailing letter-spacing */
        opacity: 0;
        animation: fadeIn 1.6s ease-out forwards 0.2s;
      }
      #title .sub {
        font-size: clamp(12px, 1.15vw, 15px);
        letter-spacing: 0.55em;
        text-transform: uppercase;
        color: rgba(58, 42, 26, 0.75);
        opacity: 0;
        animation: fadeIn 1.6s ease-out forwards 0.5s;
      }
      #title .begin {
        margin-top: 4.2em;
        padding: 14px 42px;
        font: inherit;
        font-size: 13px;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: #2a1d12;
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(42, 29, 18, 0.55);
        cursor: pointer;
        pointer-events: auto;
        opacity: 0;
        animation: fadeIn 1.6s ease-out forwards 0.8s;
        transition:
          background 0.7s ease,
          border-color 0.7s ease,
          color 0.7s ease,
          letter-spacing 0.7s ease;
      }
      #title .begin:hover {
        background: rgba(0, 0, 0, 0.32);
        border-color: rgba(42, 29, 18, 0.85);
        color: #1a1108;
        letter-spacing: 0.6em;
      }
      #title .hint {
        position: absolute;
        bottom: 36px;
        font-size: 10.5px;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: rgba(42, 29, 18, 0.55);
        opacity: 0;
        animation: fadeIn 1.6s ease-out forwards 1.1s;
      }

      /* ---- in-game hud ---- */
      #hud {
        position: fixed; inset: 0;
        pointer-events: none;
        z-index: 4;
        opacity: 0;
        transition: opacity 1.6s ease;
      }
      #hud.visible { opacity: 1; }
      #hud .vignette {
        position: absolute; inset: 0;
        background:
          radial-gradient(ellipse at 50% 55%, transparent 50%, rgba(20,12,4,0.55) 100%);
        mix-blend-mode: multiply;
      }
      #hud .compass {
        position: absolute;
        left: 50%;
        top: 24px;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        opacity: 0.55;
        transition: opacity 0.8s ease;
      }
      #hud .compass.fade { opacity: 0.18; }
      #hud .compass .tick {
        width: 2px; height: 10px;
        background: var(--bone);
        box-shadow: 0 0 8px rgba(255, 220, 170, 0.5);
      }
      #hud .compass .label {
        font-size: 10px;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: rgba(237, 225, 200, 0.65);
      }

      #hud .prompt {
        position: fixed;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        font-size: 15px;
        letter-spacing: 0.45em;
        text-transform: uppercase;
        color: rgba(237, 225, 200, 0.9);
        text-shadow: 0 2px 14px rgba(0,0,0,0.7);
        opacity: 0;
        transition: opacity 1.4s ease;
        text-align: center;
        white-space: nowrap;
        padding: 10px 28px;
        border: 1px solid rgba(237, 225, 200, 0.25);
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 4px;
        pointer-events: none;
      }
      #hud .prompt.show { opacity: 1; }

      /* ---- lore card (lamp + cinematic message) ---- */
      #hud .lore {
        position: absolute;
        left: 50%; top: 26%;
        transform: translate(-50%, -50%);
        max-width: 640px;
        padding: 0 32px;
        text-align: center;
        opacity: 0;
        transition: opacity 1.6s ease, transform 1.6s ease;
        pointer-events: none;
      }
      #hud .lore.show { opacity: 1; transform: translate(-50%, -55%); }
      #hud .lore p {
        font-size: clamp(15px, 1.55vw, 20px);
        line-height: 2;
        letter-spacing: 0.18em;
        color: var(--bone);
        text-shadow: 0 2px 18px rgba(0,0,0,0.85);
        font-weight: 200;
      }

      #hud .cine {
        position: absolute;
        left: 50%; top: 78%;
        transform: translateX(-50%);
        max-width: 640px;
        padding: 0 32px;
        text-align: center;
        opacity: 0;
        transition: opacity 2.2s ease;
      }
      #hud .cine.show { opacity: 1; }
      #hud .cine p {
        font-size: clamp(16px, 1.7vw, 22px);
        letter-spacing: 0.32em;
        text-transform: lowercase;
        color: var(--warm);
        text-shadow: 0 2px 18px rgba(0,0,0,0.9);
        font-weight: 200;
        font-style: italic;
      }

      /* ---- ending ---- */
      #ending {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0);
        pointer-events: none;
        transition: background 5s ease;
        z-index: 6;
      }
      #ending.show {
        background: rgba(20, 10, 2, 0.88);
        pointer-events: auto;
      }
      #ending .text {
        text-align: center;
        opacity: 0;
        transition: opacity 4s ease;
      }
      #ending.show .text { opacity: 1; }
      #ending .text p {
        font-size: clamp(20px, 2.6vw, 30px);
        font-weight: 200;
        letter-spacing: 0.35em;
        color: var(--warm);
        line-height: 2;
      }
      #ending .text small {
        display: block;
        margin-top: 4em;
        font-size: 10.5px;
        letter-spacing: 0.55em;
        color: rgba(237, 225, 200, 0.4);
        text-transform: uppercase;
      }

      /* ---- loading ---- */
      #loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #000;
        z-index: 10;
        transition: opacity 1.8s ease;
      }
      #loading.gone { opacity: 0; pointer-events: none; }
      #loading .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--warm);
        animation: pulse 2.6s ease-in-out infinite;
      }

      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes pulse {
        0%, 100% { opacity: 0.2; transform: scale(0.7); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="vignette"></div>
      <div class="compass" id="compass">
        <div class="tick"></div>
        <div class="label" id="compassLabel">the tower</div>
      </div>
      <div class="prompt" id="prompt"></div>
      <div class="lore" id="lore"><p id="loreText"></p></div>
      <div class="cine" id="cine"><p id="cineText"></p></div>
    </div>

    <!-- Act One: The Quiet Cliffs — the player wakes silently. The
         original PILGRIM title overlay is removed; main.js shows its
         own fading title once the player gives input. The legacy
         placeholder elements are kept so JS that queries them still
         resolves, but they are styled invisible. -->
    <div id="title" class="hidden" style="display:none">
      <button class="begin" id="beginBtn"></button>
    </div>

    <div id="ending"></div>

    <div id="loading"><div class="dot"></div></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
