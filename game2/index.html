<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Echoes</title>
    <style>
      :root {
        --warm: #f6c89f;
        --deep: #1a1410;
        --soft: #d8c4a8;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #000;
        color: var(--soft);
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        cursor: default;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---- title overlay ---- */
      #title {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
        transition: opacity 1.6s ease;
        z-index: 5;
      }
      #title.hidden { opacity: 0; }
      #title h1 {
        font-size: clamp(48px, 9vw, 120px);
        font-weight: 300;
        letter-spacing: 0.35em;
        color: var(--warm);
        text-shadow: 0 0 30px rgba(246, 200, 159, 0.4), 0 4px 22px rgba(0,0,0,0.6);
        margin-bottom: 0.4em;
        opacity: 0;
        animation: fadeIn 3.4s ease-out forwards 0.6s;
      }
      #title .sub {
        font-size: clamp(13px, 1.2vw, 16px);
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: rgba(216, 196, 168, 0.55);
        opacity: 0;
        animation: fadeIn 3.4s ease-out forwards 1.4s;
      }
      #title .begin {
        margin-top: 4em;
        padding: 14px 38px;
        font: inherit;
        font-size: 14px;
        letter-spacing: 0.45em;
        text-transform: uppercase;
        color: var(--soft);
        background: transparent;
        border: 1px solid rgba(216, 196, 168, 0.35);
        cursor: pointer;
        pointer-events: auto;
        opacity: 0;
        animation: fadeIn 3.4s ease-out forwards 2.4s;
        transition: background 0.6s ease, border-color 0.6s ease, color 0.6s ease, letter-spacing 0.6s ease;
      }
      #title .begin:hover {
        background: rgba(246, 200, 159, 0.08);
        border-color: rgba(246, 200, 159, 0.7);
        color: var(--warm);
        letter-spacing: 0.55em;
      }
      #title .hint {
        position: absolute;
        bottom: 32px;
        font-size: 11px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: rgba(216, 196, 168, 0.35);
        opacity: 0;
        animation: fadeIn 3.4s ease-out forwards 3.2s;
      }

      /* ---- ingame hud ---- */
      #hud {
        position: fixed; inset: 0;
        pointer-events: none;
        z-index: 4;
        opacity: 0;
        transition: opacity 1.4s ease;
      }
      #hud.visible { opacity: 1; }
      #hud .vignette {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
        mix-blend-mode: multiply;
      }
      #hud .reticle {
        position: absolute; left: 50%; top: 50%;
        width: 4px; height: 4px;
        margin: -2px 0 0 -2px;
        border-radius: 50%;
        background: rgba(255, 235, 210, 0.55);
        box-shadow: 0 0 6px rgba(255, 235, 210, 0.4);
      }
      #hud .prompt {
        position: absolute;
        left: 50%; top: 70%;
        transform: translateX(-50%);
        font-size: 13px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: rgba(216, 196, 168, 0.7);
        text-shadow: 0 2px 14px rgba(0,0,0,0.7);
        opacity: 0;
        transition: opacity 1.2s ease;
        text-align: center;
        white-space: nowrap;
      }
      #hud .prompt.show { opacity: 1; }

      /* ---- ending overlay ---- */
      #ending {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0);
        pointer-events: none;
        transition: background 4s ease;
        z-index: 6;
      }
      #ending.show { background: rgba(0, 0, 0, 0.85); pointer-events: auto; }
      #ending .text {
        text-align: center;
        opacity: 0;
        transition: opacity 3s ease;
      }
      #ending.show .text { opacity: 1; }
      #ending .text p {
        font-size: clamp(18px, 2.4vw, 28px);
        font-weight: 300;
        letter-spacing: 0.3em;
        color: var(--warm);
        line-height: 2;
      }
      #ending .text small {
        display: block;
        margin-top: 4em;
        font-size: 11px;
        letter-spacing: 0.5em;
        color: rgba(216, 196, 168, 0.4);
        text-transform: uppercase;
      }

      /* ---- loading ---- */
      #loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #000;
        z-index: 10;
        transition: opacity 1.6s ease;
      }
      #loading.gone { opacity: 0; pointer-events: none; }
      #loading .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--warm);
        animation: pulse 2.6s ease-in-out infinite;
      }

      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes pulse {
        0%, 100% { opacity: 0.2; transform: scale(0.7); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="vignette"></div>
      <div class="reticle"></div>
      <div class="prompt" id="prompt"></div>
    </div>

    <div id="title">
      <h1>ECHOES</h1>
      <div class="sub">a walk at golden hour</div>
      <button class="begin" id="beginBtn">Begin</button>
      <div class="hint">WASD &nbsp;&middot;&nbsp; Mouse to look &nbsp;&middot;&nbsp; Shift to walk slower</div>
    </div>

    <div id="ending">
      <div class="text">
        <p>you remembered.</p>
        <small>echoes &mdash; thank you for walking</small>
      </div>
    </div>

    <div id="loading"><div class="dot"></div></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
